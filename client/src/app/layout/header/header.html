<header class="shadow-md p-3 w-full max-h-20 fixed top-0 z-50 bg-white">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
    <img routerLink="/" src="/images/logo.png" alt="logo" class="max-h-16" />
    <nav class="flex gap-3 my-2 uppercase text-xl">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-gray-500 hover:text-gray-700"
        >Home</a
      >
      <a routerLink="/shop" routerLinkActive="active" class="text-gray-500 hover:text-gray-700"
        >Shop</a
      >
      <a routerLink="/contact" routerLinkActive="active" class="text-gray-500 hover:text-gray-700"
        >Contact</a
      >
    </nav>
    <div class="flex gap-3 align-middle">
      <a
        routerLink="/cart"
        routerLinkActive="active"
        matBadge="{{ cartService.itemCount() }}"
        matBadgeSize="large"
        class="custom-badge mt-2 mr-2"
      >
        <mat-icon>shopping_cart</mat-icon>
      </a>
      <button matButton="outlined">Login</button>
      <button mat-stroked-button>Register</button>
    </div>
  </div>
</header>

@if (busyService.loading) {
  <mat-progress-bar mode="indeterminate" class="fixed top-20 z-50"></mat-progress-bar>
}
